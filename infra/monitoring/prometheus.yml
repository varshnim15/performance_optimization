global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'performance-optimizer'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/api/actuator/prometheus'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'jmx-exporter'
    static_configs:
      - targets: ['jmx-exporter:5556']

  - job_name: 'blackbox-exporter'
    metrics_path: /probe
    static_configs:
      - targets:
          - http://localhost:3000
          - http://backend:8080/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql:3306']
