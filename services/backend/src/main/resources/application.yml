spring:
  application:
    name: perf-optimizer-backend
  
  datasource:
    url: jdbc:mysql://mysql:3306/perf_optimizer
    username: root
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 2000ms
  
  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-change-in-production-12345678901234567890}
      expiration: 86400000

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.perfoptimizer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

app:
  jmx:
    enabled: true
    host: ${JMX_HOST:localhost}
    port: ${JMX_PORT:9010}
  
  alerts:
    slack:
      webhook-url: ${SLACK_WEBHOOK_URL:}
    teams:
      webhook-url: ${TEAMS_WEBHOOK_URL:}
    email:
      smtp-host: ${SMTP_HOST:}
      smtp-port: ${SMTP_PORT:587}
      smtp-username: ${SMTP_USERNAME:}
      smtp-password: ${SMTP_PASSWORD:}
  
  ai:
    service-url: ${AI_SERVICE_URL:http://ai-service:8001}
    api-key: ${AI_SERVICE_KEY:}
    
  aws:
    region: ${AWS_REGION:us-east-1}
    sns:
      topic-arn: ${SNS_TOPIC_ARN:}
    cloudwatch:
      namespace: PerformanceOptimizer
