version: '3.9'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: perf-optimizer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: perf_optimizer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-optimizer-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: perf-optimizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-optimizer-network

  # Spring Boot Backend
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: perf-optimizer-backend
    environment:
      DB_PASSWORD: root123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:8001
      JWT_SECRET: your-secret-key-change-in-production
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/metrics/current"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-optimizer-network
    volumes:
      - ./services/backend/src:/app/src

  # Python AI Service
  ai-service:
    build:
      context: ./services/ai_service
      dockerfile: Dockerfile
    container_name: perf-optimizer-ai-service
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 8001
      DB_HOST: mysql
      DB_PASSWORD: root123
      REDIS_HOST: redis
    ports:
      - "8001:8001"
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - perf-optimizer-network

  # Next.js Frontend
  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
    container_name: perf-optimizer-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - perf-optimizer-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: perf-optimizer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - perf-optimizer-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: perf-optimizer-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infra/monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
    depends_on:
      - prometheus
    networks:
      - perf-optimizer-network

  # AlertManager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: perf-optimizer-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - perf-optimizer-network

  # Node Exporter (for system metrics)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: perf-optimizer-node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    networks:
      - perf-optimizer-network

  # Blackbox Exporter (for uptime monitoring)
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: perf-optimizer-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./infra/monitoring/blackbox.yml:/config/blackbox.yml
    command:
      - '--config.file=/config/blackbox.yml'
    networks:
      - perf-optimizer-network

volumes:
  mysql_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  perf-optimizer-network:
    driver: bridge
